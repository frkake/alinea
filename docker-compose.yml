# docker-compose.yml(リポジトリルート)
# 開発でコンテナ化するのはデータ基盤のみ。web/api/worker/extension はホストで直接実行する。
name: yakudoku

services:
  db:
    # 決定: debian 版を使う。理由: alpine 版は英語ステミング用の token_filters/stem.so を同梱せず
    # PGroonga 索引(plans/11 §2.2 の英語面 TokenFilterStem)が作れない(実測)。debian 版は
    # stem.so + tokenizers/mecab.so を同梱し plans/11 §2.3-2.4 の前提を満たす。
    image: groonga/pgroonga:4.0.1-debian-16
    container_name: yakudoku-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yakudoku
      POSTGRES_PASSWORD: yakudoku
      POSTGRES_DB: yakudoku
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    # PGroonga のクラッシュ後索引破損防止(plans/02 §7・plans/11 §2.3)
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pgroonga_wal_resource_manager"
      - "-c"
      - "pgroonga.enable_wal=on"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yakudoku -d yakudoku"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: yakudoku-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: yakudoku-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 管理コンソール
    environment:
      MINIO_ROOT_USER: yakudoku
      MINIO_ROOT_PASSWORD: yakudoku-dev-secret
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    # 決定: entrypoint を /bin/sh に上書きし、内部ホスト minio へのプロキシを無効化する。
    # 理由: 企業プロキシ環境では Docker が http_proxy を全コンテナに注入し、mc が
    # 内部ホスト minio:9000 をプロキシ経由で解決しようとして失敗する(実測: Squid 経由)。
    # minio を no_proxy に加え、プロキシ変数を空にしてから作成・検証する。
    # 最後に `mc ls` 双方の成否でバケット作成を検証して終了コードを確定する。
    environment:
      no_proxy: "minio,localhost,127.0.0.1"
      NO_PROXY: "minio,localhost,127.0.0.1"
      http_proxy: ""
      https_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 yakudoku yakudoku-dev-secret || true
        mc mb --ignore-existing local/yakudoku-sources || true
        mc mb --ignore-existing local/yakudoku-assets || true
        mc ls local/yakudoku-sources >/dev/null 2>&1 && mc ls local/yakudoku-assets >/dev/null 2>&1

  mailpit:
    image: axllent/mailpit:v1.27.0
    container_name: yakudoku-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI(受信メール確認 = ログインリンクの取得)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db-data:
  redis-data:
  minio-data:
