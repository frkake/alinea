# モデルレジストリのシード(plans/04 §7)。実行時の正は DB(llm_models)。
# 価格は 2026-07-06 時点(scratchpad/extract/_models.md)。
# 登録禁止(下記は登録しない): deepseek-chat / deepseek-reasoner(2026-07-24 廃止)、
# imagen-4.0-generate-001(2026-08-17 停止予定)、gpt-image-1.5(gpt-image-2 に一本化)。
version: "2026-07-06"

providers:
  openai:
    sdk: openai
    base_url: null                      # SDK 既定(https://api.openai.com/v1)
    env_key: OPENAI_API_KEY
    modalities: [text, image]
  anthropic:
    sdk: anthropic
    base_url: null                      # SDK 既定(https://api.anthropic.com)
    env_key: ANTHROPIC_API_KEY
    modalities: [text]
  google:
    sdk: google-genai
    base_url: null                      # SDK 既定(generativelanguage.googleapis.com)
    env_key: GEMINI_API_KEY
    modalities: [text, image]
  deepseek:
    sdk: openai                         # OpenAI 互換
    base_url: "https://api.deepseek.com"
    env_key: DEEPSEEK_API_KEY
    modalities: [text]
  xai:
    sdk: openai                         # OpenAI 互換
    base_url: "https://api.x.ai/v1"
    env_key: XAI_API_KEY
    modalities: [text, image]

text_models:
  - id: gpt-5.5
    provider: openai
    display_name: "GPT-5.5"
    context_window: 1000000
    max_output_tokens: 128000
    pricing: {input_per_mtok: 5.00, cached_input_per_mtok: 0.50, output_per_mtok: 30.00}
    capabilities: {streaming: true, structured_native: true, vision: true,
                   prompt_cache: implicit, effort: true}
    enabled: true
  - id: gpt-5.4-mini
    provider: openai
    display_name: "GPT-5.4 mini"
    context_window: 400000
    max_output_tokens: 128000
    pricing: {input_per_mtok: 0.75, cached_input_per_mtok: 0.075, output_per_mtok: 4.50}
    capabilities: {streaming: true, structured_native: true, vision: true,
                   prompt_cache: implicit, effort: true}
    enabled: true
