# 埋め込みモデル(S12 セマンティック検索。docs/10 §5・spec §D1)。
# text/image とは別セクション。llm_models の modality CHECK は ('text','image') のため、
# 0002 のシーダはこのセクションを DB に投入しない(埋め込みは llm_task_routes の 8 タスク
# にも混ぜない)。実行時の埋め込み設定は routing.yaml の embedding: を参照する。
embedding_models:
  - id: text-embedding-3-small
    provider: openai
    display_name: "OpenAI text-embedding-3-small"
    dimensions: 1536
    pricing: {input_per_mtok: 0.02}
    enabled: true
  - id: text-embedding-3-large
    provider: openai
    display_name: "OpenAI text-embedding-3-large"
    dimensions: 3072       # 記録用。既定は small(1536)。切替時は全再インデックス(spec §6.4)
    pricing: {input_per_mtok: 0.13}
    enabled: false

image_models:
  - id: gemini-3.1-flash-image
    provider: google
    display_name: "Gemini 3.1 Flash Image (Nano Banana 2)"
    pricing_per_image: {standard: 0.067, high: 0.134}    # 1K / 2K
    enabled: true
  - id: gemini-3-pro-image
    provider: google
    display_name: "Gemini 3 Pro Image (Nano Banana Pro)"
    pricing_per_image: {standard: 0.134, high: 0.24}     # 1K/2K / 4K
    enabled: true
  - id: gpt-image-2
    provider: openai
    display_name: "GPT Image 2"
    pricing_per_image: {standard: 0.053, high: 0.211}    # medium / high(1024x1024 目安)
    enabled: true
  - id: grok-imagine-image
    provider: xai
    display_name: "Grok Imagine"
    pricing_per_image: {standard: 0.02, high: 0.05}      # high は -quality に自動置換(§6.6)
    enabled: true
