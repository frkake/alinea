  - id: gemini-3.5-flash
    provider: google
    display_name: "Gemini 3.5 Flash"
    context_window: 1000000
    max_output_tokens: 65000
    pricing: {input_per_mtok: 1.50, cached_input_per_mtok: 0.375, output_per_mtok: 9.00}
