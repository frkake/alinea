[project]
name = "yakudoku-llm"
version = "0.1.0"
description = "訳読 / YAKUDOKU — LLM/画像プロバイダ抽象化層(5社テキスト+3社画像・ルーティング・BYOK)"
requires-python = "==3.12.*"
dependencies = [
  "pydantic==2.11.7",
  "httpx==0.28.1",
  "openai==1.93.0",
  "anthropic==0.57.1",
  "google-genai==1.24.0",
  "tiktoken>=0.7.0",
  "pyyaml>=6.0",
  "jsonschema>=4.20.0",
  "pillow>=10.0.0",
  "cryptography==45.0.5",
  "starlette>=0.40.0",
  "uvicorn[standard]==0.35.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakudoku_llm"]
