[project]
name = "alinea-core"
version = "0.1.0"
description = "Alinea — 共有ドメインコア(DBモデル・ドキュメントIR・パーサ・翻訳・検索)"
requires-python = "==3.12.*"
dependencies = [
  "sqlalchemy[asyncio]==2.0.41",
  "asyncpg==0.30.0",
  "pydantic==2.11.7",
  "pydantic-settings==2.10.1",
  "python-ulid==3.0.0",
  "aioboto3>=13.4.0,<14",
  "selectolax>=0.3.29",
  "xxhash>=3.4.0",
  "httpx==0.28.1",
  "alinea-llm",
  "cryptography==45.0.5",
  "redis>=5.0.0",
  "pillow>=10.0.0",
  "pymupdf>=1.24.0",
  "pdfplumber>=0.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alinea_core"]
