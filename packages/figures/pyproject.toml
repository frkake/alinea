[project]
name = "yakudoku-figures"
version = "0.1.0"
description = "訳読 / YAKUDOKU — 概要図 DSL と決定的 SVG レンダラ(plans/07 §5)"
requires-python = "==3.12.*"
dependencies = [
  "pydantic==2.11.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yakudoku_figures"]
