name: ci
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql+asyncpg://yakudoku:yakudoku@localhost:5432/yakudoku
  REDIS_URL: redis://localhost:6379/0

jobs:
  js:
    name: JS lint / typecheck / unit test / build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build lint typecheck test
      - run: pnpm prettier --check .

  python:
    name: Python lint / typecheck / test
    runs-on: ubuntu-24.04
    services:
      db:
        image: groonga/pgroonga:4.0.1-alpine-16
        env:
          POSTGRES_USER: yakudoku
          POSTGRES_PASSWORD: yakudoku
          POSTGRES_DB: yakudoku
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U yakudoku" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.20"
      - run: uv python install
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      # mypy はパッケージ単位で実行する(各 tests/conftest.py がルート一括だとモジュール名衝突するため)
      - run: uv run mypy packages/py-core
      - run: uv run mypy packages/llm
      - run: uv run mypy packages/figures
      - run: uv run mypy apps/api
      - run: uv run mypy apps/worker
      - run: psql "postgresql://yakudoku:yakudoku@localhost:5432/yakudoku" -c "CREATE EXTENSION IF NOT EXISTS pgroonga; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - run: uv run alembic upgrade head
        working-directory: apps/api
      # トレーサビリティ: M0 対象テスト ID(PY/HP/VT)が実テストに実在するか + docs↔§6 件数突合
      - run: uv run python tools/traceability/check.py
      # pytest + カバレッジ(総合 80%)。実プロバイダ SDK アダプタは CI が実 LLM に
      # 接続しない(plans/12 §16)ため到達不能。tools/coverage/coveragerc で omit する。
      - run: >-
          uv run pytest
          --cov-config=tools/coverage/coveragerc
          --cov=yakudoku_core --cov=yakudoku_llm --cov=yakudoku_api --cov=yakudoku_worker
          --cov-report=term-missing --cov-fail-under=80
      # 重点モジュール placeholder.py は行カバレッジ 100% を要求(plans/12 §2.1)
      - run: >-
          uv run coverage report
          --include='*/yakudoku_core/translation/placeholder.py' --fail-under=100

  openapi-drift:
    name: OpenAPI クライアントのドリフト検出
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.20"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: uv sync --all-packages --frozen
      - run: pnpm install --frozen-lockfile
      - run: uv run python -m yakudoku_api.export_openapi > packages/api-client/openapi.json
      - run: pnpm --filter @yakudoku/api-client generate
      - run: git diff --exit-code packages/api-client

  e2e:
    name: Playwright E2E(Chromium, 1440x900)
    runs-on: ubuntu-24.04
    needs: [js, python]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.20"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: docker compose up -d --wait db redis minio minio-init mailpit
      - run: uv sync --all-packages --frozen
      - run: pnpm install --frozen-lockfile
      - run: uv run alembic upgrade head
        working-directory: apps/api
      - run: uv run python -m yakudoku_api.seed --sample rectified-flow
      - run: pnpm --filter @yakudoku/web exec playwright install --with-deps chromium
      - run: pnpm --filter @yakudoku/web e2e
        env:
          OPENAI_API_KEY: test-stub
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report

  extension:
    name: 拡張ビルド(Chrome / Edge zip)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @yakudoku/extension zip
      - run: pnpm --filter @yakudoku/extension zip:edge
      - uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: apps/extension/.output/*.zip
